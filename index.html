<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapbox 3D World Map with Animated Person</title>

    <!-- Mapbox GL JS -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet" />

    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #map { width: 100%; height: 100%; }

        #controls-panel {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            color: #e0e0e0;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.7;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 280px;
        }
        #controls-panel h3 {
            margin-bottom: 8px;
            font-size: 14px;
            color: #fff;
            letter-spacing: 0.5px;
        }
        #controls-panel .key {
            display: inline-block;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 1px 7px;
            font-family: monospace;
            font-size: 12px;
            margin: 0 2px;
            color: #fff;
        }
        #status-bar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            color: #e0e0e0;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 13px;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.08);
            white-space: nowrap;
        }
        #status-bar .state {
            color: #4fc3f7;
            font-weight: 600;
        }
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #fff;
            transition: opacity 0.6s;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div>Loading world map &amp; 3D character…</div>
    </div>

    <div id="map"></div>

    <div id="status-bar">
        Action: <span class="state" id="action-state">Idle</span>
        &nbsp;|&nbsp; Coordinates: <span id="coord-display">—</span>
    </div>

    <div id="controls-panel">
        <h3>Controls</h3>
        <span class="key">W</span> / <span class="key">↑</span> Move forward<br/>
        <span class="key">S</span> / <span class="key">↓</span> Move backward<br/>
        <span class="key">A</span> / <span class="key">←</span> Turn left<br/>
        <span class="key">D</span> / <span class="key">→</span> Turn right<br/>
        <span class="key">Shift</span> + move = Run<br/>
        <span class="key">Space</span> Jump
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ─── Configuration ───────────────────────────────────────
        // Replace with your Mapbox access token
        mapboxgl.accessToken = 'pk.eyJ1IjoiZGVtby10b2tlbiIsImEiOiJjbHRkMXo4YW0wMDFqMnFwZjVlZ3R2bWNhIn0.demo';

        const MODEL_URL = 'https://threejs.org/examples/models/gltf/Soldier.glb';

        // Starting location (Paris, France — near Eiffel Tower)
        const MODEL_ORIGIN = [2.2945, 48.8584];
        const MODEL_ALTITUDE = 0;
        const MODEL_ROTATE = [Math.PI / 2, 0, 0];

        // Movement speeds (in degrees of lng/lat per frame at 60fps)
        const WALK_SPEED = 0.00003;
        const RUN_SPEED = 0.00009;
        const TURN_SPEED = 2.0; // degrees per frame

        // ─── State ───────────────────────────────────────────────
        const keys = {};
        let characterHeading = 0; // degrees, 0 = north
        let modelPosition = { lng: MODEL_ORIGIN[0], lat: MODEL_ORIGIN[1] };

        // Three.js objects
        let threeCamera, threeScene, threeRenderer;
        let model, mixer;
        const animations = {};
        let activeAction = null;
        let activeActionName = 'Idle';
        const clock = new THREE.Clock();

        // Jump state
        let isJumping = false;
        let jumpVelocity = 0;
        let jumpHeight = 0;
        const JUMP_FORCE = 0.15;
        const GRAVITY = 0.006;

        // ─── Mapbox Map ──────────────────────────────────────────
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/standard-satellite',
            zoom: 18,
            center: MODEL_ORIGIN,
            pitch: 60,
            bearing: 0,
            antialias: true
        });

        map.addControl(new mapboxgl.NavigationControl(), 'top-right');

        // ─── Coordinate transform helpers ────────────────────────
        // Mapbox uses Mercator; Three.js needs a model transform matrix.
        const modelAsMercatorCoordinate = mapboxgl.MercatorCoordinate.fromLngLat(
            MODEL_ORIGIN, MODEL_ALTITUDE
        );
        const modelScale = modelAsMercatorCoordinate.meterInMercatorCoordinateUnits();

        // ─── Custom Three.js Layer ───────────────────────────────
        const customLayer = {
            id: '3d-model',
            type: 'custom',
            renderingMode: '3d',

            onAdd(mapInstance, gl) {
                // Camera — Mapbox will supply the projection matrix
                threeCamera = new THREE.Camera();

                // Scene
                threeScene = new THREE.Scene();

                // Lights
                const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
                threeScene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
                directionalLight.position.set(0, 70, 100).normalize();
                threeScene.add(directionalLight);

                const directionalLight2 = new THREE.DirectionalLight(0xffd68a, 0.6);
                directionalLight2.position.set(-50, 30, -50).normalize();
                threeScene.add(directionalLight2);

                // Load the 3D person model
                const loader = new GLTFLoader();
                loader.load(MODEL_URL, (gltf) => {
                    model = gltf.scene;

                    // Create animation mixer
                    mixer = new THREE.AnimationMixer(model);

                    // Extract named animations
                    gltf.animations.forEach((clip) => {
                        const action = mixer.clipAction(clip);
                        animations[clip.name] = action;
                        console.log('Loaded animation:', clip.name);
                    });

                    // Start with Idle
                    if (animations['Idle']) {
                        activeAction = animations['Idle'];
                        activeAction.play();
                        activeActionName = 'Idle';
                    }

                    threeScene.add(model);

                    // Hide loading overlay
                    document.getElementById('loading-overlay').classList.add('hidden');
                });

                // Renderer — use the existing WebGL context from Mapbox
                threeRenderer = new THREE.WebGLRenderer({
                    canvas: mapInstance.getCanvas(),
                    context: gl,
                    antialias: true
                });
                threeRenderer.autoClear = false;
            },

            render(gl, matrix) {
                if (!model) return;

                // Update animation mixer
                const delta = clock.getDelta();
                if (mixer) mixer.update(delta);

                // Recompute mercator position from current lng/lat
                const mercatorPos = mapboxgl.MercatorCoordinate.fromLngLat(
                    [modelPosition.lng, modelPosition.lat], MODEL_ALTITUDE + jumpHeight
                );

                // Build the model transform matrix
                const rotationX = new THREE.Matrix4().makeRotationAxis(
                    new THREE.Vector3(1, 0, 0), MODEL_ROTATE[0]
                );
                const rotationY = new THREE.Matrix4().makeRotationAxis(
                    new THREE.Vector3(0, 1, 0), MODEL_ROTATE[1]
                );
                const rotationZ = new THREE.Matrix4().makeRotationAxis(
                    new THREE.Vector3(0, 0, 1), MODEL_ROTATE[2]
                );

                // Character heading rotation (around Z in mercator space, which is "up")
                const headingRad = THREE.MathUtils.degToRad(characterHeading);
                const rotationHeading = new THREE.Matrix4().makeRotationAxis(
                    new THREE.Vector3(0, 0, 1), headingRad
                );

                const s = modelScale * 1.2; // scale the soldier to a reasonable size
                const modelTransform = new THREE.Matrix4()
                    .makeTranslation(mercatorPos.x, mercatorPos.y, mercatorPos.z)
                    .scale(new THREE.Vector3(s, -s, s))
                    .multiply(rotationX)
                    .multiply(rotationY)
                    .multiply(rotationZ)
                    .multiply(rotationHeading);

                // Apply the model transform BEFORE rendering
                model.matrixAutoUpdate = false;
                model.matrix.copy(modelTransform);

                // Set the Three.js camera to match Mapbox's projection
                threeCamera.projectionMatrix = new THREE.Matrix4().fromArray(matrix);

                // Update Three.js renderer state
                threeRenderer.resetState();
                threeRenderer.render(threeScene, threeCamera);

                // Keep re-rendering
                map.triggerRepaint();
            }
        };

        // ─── Map Load ────────────────────────────────────────────
        map.on('style.load', () => {
            // Add 3D terrain
            map.addSource('mapbox-dem', {
                type: 'raster-dem',
                url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
                tileSize: 512,
                maxzoom: 14
            });
            map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });

            // Add the 3D model layer
            map.addLayer(customLayer);
        });

        // ─── Keyboard Input ──────────────────────────────────────
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') {
                e.preventDefault();
                keys['space'] = true;
            }
            if (e.key === 'Shift') keys['shift'] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            if (e.key === ' ') keys['space'] = false;
            if (e.key === 'Shift') keys['shift'] = false;
        });

        // ─── Animation Transitions ──────────────────────────────
        function switchAnimation(name) {
            if (name === activeActionName) return;
            if (!animations[name]) return;

            const prevAction = activeAction;
            activeAction = animations[name];
            activeActionName = name;

            if (prevAction) {
                prevAction.fadeOut(0.2);
            }
            activeAction.reset().fadeIn(0.2).play();

            document.getElementById('action-state').textContent = name;
        }

        // ─── Game Loop ───────────────────────────────────────────
        function gameLoop() {
            requestAnimationFrame(gameLoop);

            const isForward = keys['w'] || keys['arrowup'];
            const isBackward = keys['s'] || keys['arrowdown'];
            const isTurnLeft = keys['a'] || keys['arrowleft'];
            const isTurnRight = keys['d'] || keys['arrowright'];
            const isRunning = keys['shift'];
            const isMoving = isForward || isBackward;

            // Turning
            if (isTurnLeft) characterHeading -= TURN_SPEED;
            if (isTurnRight) characterHeading += TURN_SPEED;

            // Movement
            if (isMoving) {
                const speed = isRunning ? RUN_SPEED : WALK_SPEED;
                const direction = isBackward ? -1 : 1;
                const headingRad = THREE.MathUtils.degToRad(characterHeading);

                // Move in the direction the character is facing
                modelPosition.lat += Math.cos(headingRad) * speed * direction;
                modelPosition.lng += Math.sin(headingRad) * speed * direction;
            }

            // Jumping
            if (keys['space'] && !isJumping) {
                isJumping = true;
                jumpVelocity = JUMP_FORCE;
            }
            if (isJumping) {
                jumpHeight += jumpVelocity;
                jumpVelocity -= GRAVITY;
                if (jumpHeight <= 0) {
                    jumpHeight = 0;
                    isJumping = false;
                    jumpVelocity = 0;
                }
            }

            // Choose animation
            if (isMoving && isRunning) {
                switchAnimation('Run');
            } else if (isMoving) {
                switchAnimation('Walk');
            } else {
                switchAnimation('Idle');
            }

            // Update coordinate display
            document.getElementById('coord-display').textContent =
                `${modelPosition.lat.toFixed(5)}, ${modelPosition.lng.toFixed(5)}`;

            // Re-center map on character smoothly
            if (isMoving || isTurnLeft || isTurnRight) {
                map.easeTo({
                    center: [modelPosition.lng, modelPosition.lat],
                    duration: 100,
                    easing: (t) => t
                });
            }
        }

        gameLoop();
    </script>
</body>
</html>
